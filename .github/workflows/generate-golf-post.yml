name: Generate Daily Golf Post

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  generate-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate golf post
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/generate-post.js

      - name: Commit post to repository
        run: |
          git config user.name "golf-bot"
          git config user.email "golf-bot@midhandicap.com"
          git remote set-url origin https://balthar23:${{ secrets.GH_PAT }}@github.com/balthar23/balthar23.git
          git add pending-posts/
          git diff --cached --quiet || git commit -m "Add golf post: $(date +'%Y-%m-%d')"
          git push
