name: Publish Golf Post

on:
  push:
    paths:
      - 'pending-posts/**.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find and publish new post
        env:
          FAIRWAY_API_KEY: ${{ secrets.FAIRWAY_API_KEY }}
        run: |
          # Find the most recently modified JSON file in pending-posts/
          POST_FILE=$(ls -t pending-posts/*.json 2>/dev/null | head -1)
          
          if [ -z "$POST_FILE" ]; then
            echo "No post files found in pending-posts/"
            exit 0
          fi
          
          echo "Publishing: $POST_FILE"
          cat "$POST_FILE"
          
          # POST it to the API
          RESPONSE=$(curl -s -X POST https://midhandicap.com/api.php/posts \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $FAIRWAY_API_KEY" \
            -d @"$POST_FILE")
          
          echo "API response: $RESPONSE"
          
          # Check for success
          if echo "$RESPONSE" | grep -q '"success":true'; then
            echo "✅ Post published successfully"
            echo "POST_FILE=$POST_FILE" >> $GITHUB_ENV
          else
            echo "❌ Publish failed"
            exit 1
          fi

      - name: Delete published post file
        run: |
          if [ -n "$POST_FILE" ]; then
            git config user.name "golf-bot"
            git config user.email "golf-bot@midhandicap.com"
            git remote set-url origin https://balthar23:${{ secrets.GH_PAT }}@github.com/balthar23/balthar23.git
            git rm "$POST_FILE"
            git commit -m "Remove published post: $POST_FILE"
            git push
            echo "🗑️ Deleted $POST_FILE"
          fi
