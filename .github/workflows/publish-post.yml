name: Publish Golf Post

on:
  push:
    paths:
      - 'pending-posts/**.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find and publish new post
        env:
          FAIRWAY_API_KEY: ${{ secrets.FAIRWAY_API_KEY }}
        run: |
          POST_FILE=$(git diff-tree --no-commit-id -r --name-only HEAD | grep 'pending-posts/.*\.json' | head -1)
          if [ -z "$POST_FILE" ]; then
            POST_FILE=$(ls pending-posts/*.json 2>/dev/null | sort -V | tail -1)
          fi
          echo "Publishing: $POST_FILE"
          cat "$POST_FILE"
          RESPONSE=$(curl -s -X POST https://midhandicap.com/api.php/posts \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $FAIRWAY_API_KEY" \
            -d @"$POST_FILE")
          echo "API response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"success":true'; then
            echo "✅ Post published successfully"
          else
            echo "❌ Publish failed"
            exit 1
          fi
