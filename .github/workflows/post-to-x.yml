name: Auto Post to X

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  tweet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install twitter-api-v2

      - name: Create tweet script
        run: |
          printf '%s\n' \
          "const { TwitterApi } = require('twitter-api-v2');" \
          "" \
          "const client = new TwitterApi({" \
          "  appKey: process.env.X_API_KEY," \
          "  appSecret: process.env.X_API_SECRET," \
          "  accessToken: process.env.X_ACCESS_TOKEN," \
          "  accessSecret: process.env.X_ACCESS_SECRET," \
          "});" \
          "" \
          "async function sendTweet() {" \
          "  try {" \
          "    const text = 'GitHub Actions test tweet ✅ ' + new Date().toISOString();" \
          "    const response = await client.v2.tweet(text);" \
          "    console.log('SUCCESS:', response);" \
          "    return true;" \
          "  } catch (error) {" \
          "    console.error('ERROR:', error);" \
          "    return false;" \
          "  }" \
          "}" \
          "" \
          "async function runWithRetries(maxRetries = 5) {" \
          "  for (let attempt = 1; attempt <= maxRetries; attempt++) {" \
          "    if (await sendTweet()) return;" \
          "    console.log('Retry ' + attempt + ' failed, waiting…');" \
          "    await new Promise(r => setTimeout(r, attempt * 3000));" \
          "  }" \
          "  process.exit(1);" \
          "}" \
          "" \
          "runWithRetries();" \
          > tweet.js

      - name: Run tweet script
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: node tweet.js
